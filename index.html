<!DOCTYPE html>
<html>
<head>
  <title>Vehicle Inspection</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    body {
      display: flex;
      font-family: Arial;
      margin: 0;
    }

    #sidebar {
      width: 250px;
      background: #1e1e1e;
      color: white;
      height: 100vh;
      overflow-y: auto;
    }

    #sidebar div {
      padding: 15px;
      cursor: pointer;
      border-bottom: 1px solid #333;
    }

    #sidebar div:hover {
      background: #333;
    }

    #main {
      flex: 1;
      padding: 20px;
    }

    .item {
      border-bottom: 1px solid #ccc;
      padding: 10px 0;
    }

    .controls {
      display: flex;
      gap: 15px;
      margin-top: 5px;
    }

    textarea {
      width: 100%;
      margin-top: 5px;
    }

    .tire-box {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }

    button {
      margin-top: 20px;
      padding: 15px;
      font-size: 16px;
    }

    #finalReport {
      display: block;
      padding: 20px;
      background: white;
      color: black;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid black;
      padding: 6px;
      font-size: 11pt;
    }

    th {
      background: #eee;
    }

    .fail {
      background: #f8d7da;
    }

    .header-box {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .signature {
      margin-top: 40px;
    }
  </style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
  <h2 id="categoryTitle"></h2>
  <div id="items"></div>

  <button onclick="finalizeInspection()">Save as PDF</button>
</div>

<div id="finalReport"></div>

<script>
const data = [/* SAME DATA AS YOURS */];

const state = {};

function initState() {
  data.forEach(cat => {
    state[cat.category] = {};
    cat.items.forEach(itemObj => {
      const name = typeof itemObj === "string" ? itemObj : itemObj.name;
      const hasTires = itemObj.hasTires || false;

      state[cat.category][name] = {
        pass: false,
        fail: false,
        notes: "",
        tires: hasTires ? { LF:false, RF:false, LR:false, RR:false } : null
      };
    });
  });
}

const sidebar = document.getElementById("sidebar");
const itemsDiv = document.getElementById("items");
const title = document.getElementById("categoryTitle");

data.forEach((cat, index) => {
  const div = document.createElement("div");
  div.innerText = cat.category;
  div.onclick = () => loadCategory(index);
  sidebar.appendChild(div);
});

function loadCategory(index) {
  const cat = data[index];
  title.innerText = cat.category;
  itemsDiv.innerHTML = "";

  if (cat.category === "Road Test") {
    itemsDiv.innerHTML += `
      VIN: <input id="vin"><br><br>
      Plate: <input id="plate"><br><br>
      Tech: <input id="tech"><br><br>
      Old Mileage: <input id="oldMileage" type="number"><br><br>
      New Mileage: <input id="newMileage" type="number"><br><br>
    `;
  }

  cat.items.forEach(itemObj => {
    const name = typeof itemObj === "string" ? itemObj : itemObj.name;
    const hasTires = itemObj.hasTires || false;
    const item = state[cat.category][name];

    const row = document.createElement("div");
    row.className = "item";

    row.innerHTML = `
      <strong>${name}</strong>
      <div class="controls">
        <label>Pass <input type="checkbox" ${item.pass ? "checked" : ""}></label>
        <label>Fail <input type="checkbox" ${item.fail ? "checked" : ""}></label>
      </div>
      ${hasTires ? `
        <div class="tire-box">
          LF <input type="checkbox" ${item.tires.LF ? "checked" : ""}>
          RF <input type="checkbox" ${item.tires.RF ? "checked" : ""}>
          LR <input type="checkbox" ${item.tires.LR ? "checked" : ""}>
          RR <input type="checkbox" ${item.tires.RR ? "checked" : ""}>
        </div>` : ""}
      <textarea placeholder="Notes...">${item.notes}</textarea>
    `;

    const inputs = row.querySelectorAll("input");
    const textarea = row.querySelector("textarea");

    inputs.forEach((input, i) => {
      input.addEventListener("change", () => {
        if (i === 0) item.pass = input.checked;
        if (i === 1) item.fail = input.checked;

        if (hasTires && i >= 2) {
          const keys = ["LF","RF","LR","RR"];
          item.tires[keys[i-2]] = input.checked;
        }
      });
    });

    textarea.addEventListener("input", () => {
      item.notes = textarea.value;
    });

    itemsDiv.appendChild(row);
  });
}

function buildFinalReport() {
  const report = document.getElementById("finalReport");

  const vin = document.getElementById("vin")?.value || "";
  const plate = document.getElementById("plate")?.value || "";
  const tech = document.getElementById("tech")?.value || "";
  const oldMileage = document.getElementById("oldMileage")?.value || "";
  const newMileage = document.getElementById("newMileage")?.value || "";

  report.innerHTML = `
    <h1>Vehicle Inspection Report</h1>

    <div class="header-box">
      <div>
        <strong>VIN:</strong> ${vin}<br>
        <strong>Plate:</strong> ${plate}
      </div>
      <div>
        <strong>Technician:</strong> ${tech}<br>
        <strong>Date:</strong> ${new Date().toLocaleDateString()}
      </div>
    </div>

    <div>
      <strong>Old Mileage:</strong> ${oldMileage} |
      <strong>New Mileage:</strong> ${newMileage}
    </div>
  `;

  Object.keys(state).forEach(category => {
    const catDiv = document.createElement("div");
    catDiv.innerHTML = `<h2>${category}</h2>`;

    const table = document.createElement("table");
    table.innerHTML = `
      <tr>
        <th>Item</th>
        <th>Pass</th>
        <th>Fail</th>
        <th>Tires</th>
        <th>Notes</th>
      </tr>
    `;

    Object.keys(state[category]).forEach(item => {
      const i = state[category][item];

      let tireText = "";
      if (i.tires) {
        tireText = `LF:${i.tires.LF?"✔":""} RF:${i.tires.RF?"✔":""} LR:${i.tires.LR?"✔":""} RR:${i.tires.RR?"✔":""}`;
      }

      const row = document.createElement("tr");
      if (i.fail) row.classList.add("fail");

      row.innerHTML = `
        <td>${item}</td>
        <td>${i.pass ? "✔" : ""}</td>
        <td>${i.fail ? "✔" : ""}</td>
        <td>${tireText}</td>
        <td>${i.notes || ""}</td>
      `;

      table.appendChild(row);
    });

    catDiv.appendChild(table);
    report.appendChild(catDiv);
  });

  report.innerHTML += `
    <div class="signature">
      Technician Signature: ___________________________
    </div>
  `;
}

function finalizeInspection() {
  buildFinalReport();

  const element = document.getElementById("finalReport");

  html2pdf().set({
    margin: 0.5,
    filename: 'inspection_report.pdf',
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
  }).from(element).save();
}

initState();
loadCategory(0);
</script>

</body>
</html>
