<!DOCTYPE html>
<html>
<head>
  <title>Vehicle Inspection</title>

  <style>
    body {
      display: flex;
      font-family: Arial;
      margin: 0;
    }

    #sidebar {
      width: 250px;
      background: #1e1e1e;
      color: white;
      height: 100vh;
      overflow-y: auto;
    }

    #sidebar div {
      padding: 15px;
      cursor: pointer;
      border-bottom: 1px solid #333;
    }

    #sidebar div:hover {
      background: #333;
    }

    #main {
      flex: 1;
      padding: 20px;
    }

    .item {
      border-bottom: 1px solid #ccc;
      padding: 10px 0;
    }

    .controls {
      display: flex;
      gap: 15px;
      margin-top: 5px;
    }

    textarea {
      width: 100%;
      margin-top: 5px;
    }

    .tire-box {
      display: flex;
      gap: 10px;
      margin-top: 5px;
    }

    button {
      margin-top: 20px;
      padding: 15px;
      font-size: 16px;
    }

    #finalReport {
      display: none;
      padding: 20px;
    }

    @media print {
      body * {
        visibility: hidden;
      }

      #finalReport, #finalReport * {
        visibility: visible;
      }

      #finalReport {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }
    }
  </style>
</head>

<body>

<div id="sidebar"></div>

<div id="main">
  <h2 id="categoryTitle"></h2>
  <div id="items"></div>

  <!-- ✅ Mileage fields added -->
  <div style="margin-top:20px;">
    <label>Old Mileage: <input id="oldMileage"></label>
    <label style="margin-left:20px;">New Mileage: <input id="newMileage"></label>
  </div>

  <button onclick="finalizeInspection()">Inspection Finalized</button>
</div>

<div id="finalReport"></div>

<script>
const data = [
  {
    category: "Interior & General",
    items: [
      "Owners Card & Insurance","VIN","Glazing","Doors","Wipers",
      "Mirrors","Seat","Seatbelt","Flooring","Horn","Defroster"
    ]
  },
  {
    category: "Under Hood",
    items: [
      "Battery","Master Cylinder","Firewall","Motor Mounts"
    ]
  },
  {
    category: "Body",
    items: [
      "Bumpers","Body","Fuel Cap","License Plate"
    ]
  },
  {
    category: "Lighting",
    items: ["Lights"]
  },
  {
    category: "Wheels & Tires",
    items: [
      { name: "Tires", hasTires: true },
      { name: "Wheels" }
    ]
  },
  {
    category: "Suspension / Steering",
    items: ["Suspension","Steering"]
  },
  {
    category: "Brakes",
    items: [
      { name: "Brakes", hasTires: true },
      "Brake Pedal","Parking Brake"
    ]
  },
  {
    category: "Fuel / Exhaust",
    items: ["Fuel","Exhaust"]
  },
  {
    category: "Frame",
    items: ["Frame"]
  },
  {
    category: "Emissions",
    items: ["Emission Control System"]
  },
  {
    category: "Road Test",
    items: [
      "Parking Brake (Road)","Automatic Transmission","Stopping Distance",
      "Speedometer","Odometer","Forward & Reverse","Questionable Behavior"
    ]
  }
];

const state = {};

const sidebar = document.getElementById("sidebar");
const itemsDiv = document.getElementById("items");
const title = document.getElementById("categoryTitle");

data.forEach((cat, index) => {
  state[cat.category] = {};

  const div = document.createElement("div");
  div.innerText = cat.category;
  div.onclick = () => loadCategory(index);
  sidebar.appendChild(div);
});

function initItemState(category, itemName, hasTires=false) {
  if (!state[category][itemName]) {
    state[category][itemName] = {
      pass: false,
      fail: false,
      notes: "",
      tires: hasTires ? { LF:false, RF:false, LR:false, RR:false } : null
    };
  }
}

function loadCategory(index) {
  const cat = data[index];
  title.innerText = cat.category;
  itemsDiv.innerHTML = "";

  cat.items.forEach(itemObj => {
    const itemName = typeof itemObj === "string" ? itemObj : itemObj.name;
    const hasTires = itemObj.hasTires || false;

    initItemState(cat.category, itemName, hasTires);

    const itemState = state[cat.category][itemName];

    const row = document.createElement("div");
    row.className = "item";

    row.innerHTML = `
      <strong>${itemName}</strong>

      <div class="controls">
        <label>Pass <input type="checkbox" ${itemState.pass ? "checked" : ""}></label>
        <label>Fail <input type="checkbox" ${itemState.fail ? "checked" : ""}></label>
      </div>

      ${hasTires ? `
        <div class="tire-box">
          LF <input type="checkbox" ${itemState.tires.LF ? "checked" : ""}>
          RF <input type="checkbox" ${itemState.tires.RF ? "checked" : ""}>
          LR <input type="checkbox" ${itemState.tires.LR ? "checked" : ""}>
          RR <input type="checkbox" ${itemState.tires.RR ? "checked" : ""}>
        </div>
      ` : ""}

      <textarea placeholder="Notes...">${itemState.notes}</textarea>
    `;

    const inputs = row.querySelectorAll("input");
    const textarea = row.querySelector("textarea");

    inputs.forEach((input, i) => {
      input.addEventListener("change", () => {
        if (i === 0) itemState.pass = input.checked;
        if (i === 1) itemState.fail = input.checked;

        if (hasTires) {
          const keys = ["LF","RF","LR","RR"];
          if (i >= 2) itemState.tires[keys[i-2]] = input.checked;
        }
      });
    });

    textarea.addEventListener("input", () => {
      itemState.notes = textarea.value;
    });

    itemsDiv.appendChild(row);
  });
}

/* ✅ NEW: Category evaluation */
function evaluateCategory(category) {
  const items = state[category];
  let hasFail = false;
  let allPass = true;

  Object.values(items).forEach(i => {
    if (i.fail) hasFail = true;
    if (!i.pass) allPass = false;
  });

  if (hasFail) return "FAIL";
  if (allPass) return "PASS";
  return "INCOMPLETE";
}

/* ✅ UPDATED REPORT */
function buildFinalReport() {
  const report = document.getElementById("finalReport");
  report.innerHTML = "<h1>Inspection Report</h1>";

  const oldMileage = document.getElementById("oldMileage").value;
  const newMileage = document.getElementById("newMileage").value;

  report.innerHTML += `<p>Old Mileage: ${oldMileage} | New Mileage: ${newMileage}</p>`;

  Object.keys(state).forEach(category => {
    const catDiv = document.createElement("div");

    const status = evaluateCategory(category);
    catDiv.innerHTML = `<h2>${category} - ${status}</h2>`;

    Object.keys(state[category]).forEach(item => {
      const itemData = state[category][item];

      let tireText = "";
      if (itemData.tires) {
        tireText = ` | Tires: LF(${itemData.tires.LF}) RF(${itemData.tires.RF}) LR(${itemData.tires.LR}) RR(${itemData.tires.RR})`;
      }

      const line = document.createElement("div");
      line.innerText =
        `${item} → Pass:${itemData.pass} Fail:${itemData.fail}${tireText} Notes:${itemData.notes}`;

      catDiv.appendChild(line);
    });

    report.appendChild(catDiv);
  });
}

function finalizeInspection() {
  buildFinalReport();
  window.print();
}

loadCategory(0);
</script>

</body>
</html>
